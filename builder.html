<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Resume Builder – ApnaResumeBuilder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #080808;
  --surface: #101010;
  --surface2: #161616;
  --border: #1f1f1f;
  --border2: #2a2a2a;
  --blue: #2563eb;
  --blue-hover: #1d4ed8;
  --blue-dim: rgba(37,99,235,0.12);
  --blue-border: rgba(37,99,235,0.3);
  --text: #f0f0f0;
  --muted: #888;
  --faint: #444;
  --danger: #dc2626;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* ────────────────── TOP BAR ────────────────── */
.topbar{
  height:52px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  flex-shrink:0;
  z-index:50;
}
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:15px;
  letter-spacing:0.3px;
}
.logo-badge{
  background:var(--blue);
  color:#fff;
  font-size:11px;
  font-weight:800;
  padding:4px 7px;
  border-radius:5px;
  letter-spacing:0.5px;
}
.topbar-actions{display:flex;gap:6px;align-items:center;}

.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:7px 13px;border-radius:7px;font-size:12.5px;
  font-weight:600;cursor:pointer;border:1px solid var(--border2);
  background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;
  transition:all 0.15s;white-space:nowrap;text-decoration:none;
}
.btn:hover{background:var(--surface2);border-color:#3a3a3a;}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff;}
.btn-primary:hover{background:var(--blue-hover);border-color:var(--blue-hover);}
.btn-ghost{border:none;color:var(--muted);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}

/* ────────────────── MAIN LAYOUT ────────────────── */
.layout{
  display:flex;
  flex:1;
  overflow:hidden;
}

/* ────────────────── SIDEBAR ────────────────── */
.sidebar{
  width:310px;
  min-width:310px;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* tabs */
.tabs{
  display:flex;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  flex-shrink:0;
}
.tab{
  flex:1;padding:11px 4px;
  background:none;border:none;
  color:var(--faint);font-size:16px;
  cursor:pointer;border-bottom:2px solid transparent;
  transition:all 0.15s;
}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);background:var(--surface);}
.tab:hover:not(.active){color:var(--muted);background:var(--surface2);}
.tab span{display:block;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-top:2px;color:inherit;}

.tab-body{flex:1;overflow-y:auto;padding:18px;}
.tab-body::-webkit-scrollbar{width:3px;}
.tab-body::-webkit-scrollbar-thumb{background:#222;border-radius:2px;}

.panel{display:none;}
.panel.active{display:block;}

/* section heading inside panel */
.slabel{
  font-size:9.5px;font-weight:700;letter-spacing:1.8px;
  text-transform:uppercase;color:var(--blue);
  margin:18px 0 10px;border-left:2px solid var(--blue);padding-left:7px;
}
.slabel:first-child{margin-top:0;}
.slabel-row{display:flex;justify-content:space-between;align-items:center;margin:18px 0 10px;}
.slabel-row:first-child{margin-top:0;}
.slabel-row .slabel{margin:0;border:none;padding:0;}

/* form fields */
.field{margin-bottom:10px;}
.field label{display:block;font-size:10.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:4px;}
.field input,.field textarea,.field select{
  width:100%;background:var(--surface2);border:1px solid var(--border2);
  color:var(--text);padding:8px 11px;border-radius:6px;
  font-size:12.5px;font-family:'DM Sans',sans-serif;outline:none;
  transition:border-color 0.15s;
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--blue);}
.field input::placeholder,.field textarea::placeholder{color:#333;}
.field textarea{resize:vertical;min-height:65px;line-height:1.5;}
.field select option{background:var(--surface2);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* entry cards */
.card{
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:8px;padding:13px;margin-bottom:8px;position:relative;
}
.card:hover{border-color:var(--blue-border);}
.card .field{margin-bottom:7px;}
.card .field:last-child{margin-bottom:0;}
.card-del{
  position:absolute;top:9px;right:9px;
  background:none;border:none;color:var(--faint);
  font-size:13px;cursor:pointer;width:20px;height:20px;
  display:flex;align-items:center;justify-content:center;border-radius:4px;
}
.card-del:hover{color:#f87171;background:rgba(248,113,113,0.1);}
.add-row{
  width:100%;padding:8px;background:none;
  border:1px dashed var(--border2);color:var(--faint);
  border-radius:6px;font-size:12px;cursor:pointer;
  transition:all 0.15s;margin-top:6px;font-family:'DM Sans',sans-serif;
}
.add-row:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-dim);}

/* photo upload */
.photo-zone{
  display:flex;align-items:center;gap:12px;margin-bottom:14px;
}
.photo-circle{
  width:56px;height:56px;border-radius:50%;
  background:var(--surface2);border:2px dashed var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;cursor:pointer;overflow:hidden;flex-shrink:0;
  transition:border-color 0.15s;
}
.photo-circle:hover{border-color:var(--blue);}
.photo-circle img{width:100%;height:100%;object-fit:cover;}

/* skills */
.skills-cloud{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;min-height:8px;}
.skill-chip{
  background:var(--blue-dim);border:1px solid var(--blue-border);
  color:#93c5fd;padding:3px 9px;border-radius:20px;font-size:11.5px;
  display:flex;align-items:center;gap:4px;
}
.skill-del{cursor:pointer;color:var(--faint);font-size:9px;transition:color 0.15s;}
.skill-del:hover{color:#f87171;}
.skill-add-row{display:flex;gap:6px;}
.skill-add-row input{flex:1;}

/* color swatches */
.swatches{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;}
.swatch{
  width:26px;height:26px;border-radius:5px;
  cursor:pointer;border:2px solid transparent;transition:all 0.15s;flex-shrink:0;
}
.swatch.active{border-color:#fff;box-shadow:0 0 0 2px var(--bg);}

input[type="range"]{
  width:100%;-webkit-appearance:none;
  background:#1f1f1f;height:4px;border-radius:2px;outline:none;margin:6px 0;
}
input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;
  background:var(--blue);border-radius:50%;cursor:pointer;
}

/* toggles */
.tog-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid var(--border);
}
.tog-row:last-child{border-bottom:none;}
.tog-row > span{font-size:12.5px;color:#ccc;}
.tog{
  width:38px;height:20px;background:#2a2a2a;border-radius:10px;
  cursor:pointer;position:relative;transition:background 0.2s;flex-shrink:0;
}
.tog.on{background:var(--blue);}
.tog::after{
  content:'';position:absolute;top:2px;left:2px;
  width:16px;height:16px;background:#fff;border-radius:50%;
  transition:transform 0.2s;
}
.tog.on::after{transform:translateX(18px);}

/* ────────────────── PREVIEW ────────────────── */
.preview{
  flex:1;background:#1a1a1a;overflow-y:auto;
  display:flex;flex-direction:column;align-items:center;
  padding:28px 20px;
  background-image:
    radial-gradient(circle at 20% 10%, rgba(37,99,235,0.04) 0%, transparent 50%),
    radial-gradient(circle at 80% 90%, rgba(37,99,235,0.03) 0%, transparent 50%);
}
.preview-label{
  font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--faint);margin-bottom:14px;align-self:flex-start;padding-left:4px;
}

.paper{
  width:794px;
  background:#fff;
  color:#111;
  font-family:'DM Sans',sans-serif;
  box-shadow:0 0 0 1px rgba(0,0,0,0.06),0 20px 60px rgba(0,0,0,0.5);
  transform:scale(0.63);
  transform-origin:top center;
  flex-shrink:0;
  /* keeps layout from collapsing after scale */
  margin-bottom: calc((297mm * 0.63) - 297mm);
}

/* ────────────────── PRINT ────────────────── */
@media print{
  .topbar,.sidebar{display:none!important;}
  .layout{display:block!important;height:auto!important;}
  .preview{padding:0!important;background:#fff!important;display:block!important;}
  .paper{transform:none!important;box-shadow:none!important;width:100%!important;margin:0!important;}
  .preview-label{display:none!important;}
}

/* ────────────────── RESPONSIVE ────────────────── */
@media(max-width:960px){
  body{overflow:auto;}
  .layout{flex-direction:column;overflow:visible;}
  .sidebar{width:100%;min-width:unset;max-height:52vh;overflow-y:auto;}
  .paper{transform:scale(0.4);transform-origin:top center;}
  .preview{padding:12px 6px;}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-badge">ARB</div>
    ApnaResumeBuilder
  </div>
  <div class="topbar-actions">
    <button class="btn" onclick="doSave(this)">💾 Save</button>
    <button class="btn" onclick="doExport()">📤 Export JSON</button>
    <button class="btn btn-primary" onclick="window.print()">⬇ Download PDF</button>
    <a href="index.html" class="btn btn-primary">🏠 Home</a>
  </div>
</div>

<!-- MAIN -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <!-- Tab bar -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('personal')">👤<span>Info</span></button>
      <button class="tab" onclick="switchTab('experience')">💼<span>Work</span></button>
      <button class="tab" onclick="switchTab('education')">🎓<span>Edu</span></button>
      <button class="tab" onclick="switchTab('projects')">🚀<span>Projects</span></button>
      <button class="tab" onclick="switchTab('design')">🎨<span>Design</span></button>
    </div>

    <!-- PERSONAL -->
    <div class="tab-body panel active" id="pan-personal">
      <div class="slabel">Profile Photo</div>
      <div class="photo-zone">
        <div class="photo-circle" onclick="document.getElementById('photoFile').click()">
          <span id="photoEmoji">📷</span>
          <img id="photoImg" style="display:none"/>
        </div>
        <div style="flex:1;">
          <button class="btn" style="width:100%;justify-content:center;" onclick="document.getElementById('photoFile').click()">Upload Photo</button>
          <input type="file" id="photoFile" accept="image/*" style="display:none" onchange="loadPhoto(event)"/>
        </div>
      </div>

      <div class="slabel">Basic Info</div>
      <div class="field"><label>Full Name</label><input id="i-name" placeholder="e.g. Arjun Sharma" oninput="render()"/></div>
      <div class="field"><label>Job Title / Role</label><input id="i-role" placeholder="e.g. Full Stack Developer" oninput="render()"/></div>

      <div class="slabel">Contact Details</div>
      <div class="g2">
        <div class="field"><label>Email</label><input id="i-email" placeholder="arjun@gmail.com" oninput="render()"/></div>
        <div class="field"><label>Phone</label><input id="i-phone" placeholder="+91 98765 43210" oninput="render()"/></div>
      </div>
      <div class="g2">
        <div class="field"><label>Location</label><input id="i-location" placeholder="Jaipur, Rajasthan" oninput="render()"/></div>
        <div class="field"><label>LinkedIn</label><input id="i-linkedin" placeholder="linkedin.com/in/arjun" oninput="render()"/></div>
      </div>
      <div class="field"><label>Website / Portfolio</label><input id="i-website" placeholder="arjunsharma.dev" oninput="render()"/></div>

      <div class="slabel">Professional Summary</div>
      <div class="field"><textarea id="i-summary" placeholder="Write a short professional summary..." oninput="render()"></textarea></div>

      <div class="slabel">Skills</div>
      <div class="skills-cloud" id="skillCloud"></div>
      <div class="skill-add-row">
        <input class="field" style="margin:0;" id="skillInput" placeholder="Type a skill & press Enter" onkeydown="if(event.key==='Enter')addSkill()"/>
        <button class="btn btn-primary" style="padding:8px 12px;" onclick="addSkill()">+</button>
      </div>
    </div>

    <!-- EXPERIENCE -->
    <div class="tab-body panel" id="pan-experience">
      <div class="slabel-row">
        <div class="slabel">Work Experience</div>
        <button class="btn btn-primary" style="padding:5px 10px;font-size:11px;" onclick="addExp()">+ Add</button>
      </div>
      <div id="expCards"></div>
    </div>

    <!-- EDUCATION -->
    <div class="tab-body panel" id="pan-education">
      <div class="slabel-row">
        <div class="slabel">Education</div>
        <button class="btn btn-primary" style="padding:5px 10px;font-size:11px;" onclick="addEdu()">+ Add</button>
      </div>
      <div id="eduCards"></div>
    </div>

    <!-- PROJECTS -->
    <div class="tab-body panel" id="pan-projects">
      <div class="slabel-row">
        <div class="slabel">Projects</div>
        <button class="btn btn-primary" style="padding:5px 10px;font-size:11px;" onclick="addProj()">+ Add</button>
      </div>
      <div id="projCards"></div>
    </div>

    <!-- DESIGN -->
    <div class="tab-body panel" id="pan-design">
      <div class="slabel">Template Style</div>
      <div class="field">
        <select id="d-template" onchange="render()">
          <option value="modern">Modern — Two Column</option>
          <option value="classic">Classic — Single Column</option>
          <option value="minimal">Minimal — Centered Header</option>
          <option value="bold">Bold — Full Header Banner</option>
        </select>
      </div>

      <div class="slabel">Accent Color</div>
      <div class="swatches" id="swatches"></div>
      <div class="field"><label>Custom Color</label>
        <input type="color" id="d-color" value="#2563eb" onchange="setColor(this.value)" style="height:34px;cursor:pointer;"/>
      </div>

      <div class="slabel">Font Size — <span id="fsVal">13</span>px</div>
      <input type="range" id="d-fs" min="10" max="16" value="13" oninput="document.getElementById('fsVal').textContent=this.value;render()"/>

      <div class="slabel">Show / Hide Sections</div>
      <div class="tog-row"><span>Profile Photo</span><div class="tog" id="t-photo" onclick="togOpt('photo')"></div></div>
      <div class="tog-row"><span>Summary</span><div class="tog on" id="t-summary" onclick="togOpt('summary')"></div></div>
      <div class="tog-row"><span>Skills</span><div class="tog on" id="t-skills" onclick="togOpt('skills')"></div></div>
      <div class="tog-row"><span>Projects</span><div class="tog on" id="t-projects" onclick="togOpt('projects')"></div></div>

      <div style="margin-top:22px;">
        <button class="btn" style="width:100%;justify-content:center;border-color:var(--danger);color:#f87171;"
          onclick="if(confirm('Reset all resume data?')){localStorage.removeItem('arb_v2');location.reload();}">🗑 Reset Everything</button>
      </div>
    </div>

  </div><!-- /sidebar -->

  <!-- PREVIEW PANE -->
  <div class="preview">
    <div class="preview-label">Live Preview — A4</div>
    <div class="paper" id="paper"></div>
  </div>

</div><!-- /layout -->

<script>
/* ═══════════════════════════ STATE ═══════════════════════════ */
var D = {
  name:"Arjun Sharma", role:"Full Stack Developer",
  email:"arjun.sharma@gmail.com", phone:"+91 98765 43210",
  location:"Jaipur, Rajasthan", linkedin:"linkedin.com/in/arjunsharma", website:"arjunsharma.dev",
  summary:"Results-driven Full Stack Developer with 5+ years of experience building scalable web applications. Passionate about clean code, performance optimisation, and delivering exceptional user experiences.",
  skills:["JavaScript","React","Node.js","Python","MongoDB","AWS","Git","REST APIs"],
  exp:[
    {id:1,title:"Senior Full Stack Developer",company:"Infosys Ltd.",period:"Jan 2022 – Present",desc:"Led development of core platform features used by 500K+ users daily. Improved application performance by 40% via code refactoring and Redis caching strategies."},
    {id:2,title:"Software Engineer",company:"Wipro Technologies",period:"Jul 2019 – Dec 2021",desc:"Built and maintained microservices architecture on AWS. Collaborated with cross-functional teams to deliver 3 major product releases on schedule."}
  ],
  edu:[{id:1,degree:"B.Tech Computer Science",school:"IIT Bombay",year:"2019",grade:"8.5 CGPA"}],
  proj:[{id:1,name:"E-Commerce Dashboard",tech:"React, Node.js, MongoDB",desc:"Full-featured admin dashboard with real-time analytics and order tracking for 10K+ daily transactions.",link:"github.com/arjunsharma/ecom"}],
  photo:"",
  color:"#2563eb", fs:13, template:"modern",
  showPhoto:false, showSummary:true, showSkills:true, showProjects:true
};

var PALETTE = ["#2563eb","#16a34a","#dc2626","#7c3aed","#ea580c","#0891b2","#be185d","#374151"];

/* ═══════════════════════════ INIT ═══════════════════════════ */
function init(){
  var saved = localStorage.getItem("arb_v2");
  if(saved) try{ D = Object.assign({},D,JSON.parse(saved)); }catch(e){}
  // Populate form
  ["name","role","email","phone","location","linkedin","website","summary"].forEach(function(f){
    var el=document.getElementById("i-"+f); if(el) el.value=D[f]||"";
  });
  document.getElementById("d-template").value = D.template;
  document.getElementById("d-fs").value = D.fs;
  document.getElementById("fsVal").textContent = D.fs;
  document.getElementById("d-color").value = D.color;
  ["photo","summary","skills","projects"].forEach(function(k){
    var t=document.getElementById("t-"+k);
    if(t) t.className="tog"+(D["show"+ucfirst(k)]?" on":"");
  });
  if(D.photo){
    document.getElementById("photoImg").src=D.photo;
    document.getElementById("photoImg").style.display="block";
    document.getElementById("photoEmoji").style.display="none";
  }
  buildPalette();
  renderSkills();
  renderCards();
  render();
}

function ucfirst(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function esc(t){ if(!t)return""; return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

/* ═══════════════════════════ TABS ═══════════════════════════ */
function switchTab(name){
  var order=["personal","experience","education","projects","design"];
  document.querySelectorAll(".tab").forEach(function(b,i){ b.classList.toggle("active",order[i]===name); });
  document.querySelectorAll(".panel").forEach(function(p){ p.classList.toggle("active",p.id==="pan-"+name); });
}

/* ═══════════════════════════ SKILLS ═══════════════════════════ */
function addSkill(){
  var inp=document.getElementById("skillInput"), v=inp.value.trim();
  if(v && !D.skills.includes(v)){ D.skills.push(v); renderSkills(); render(); }
  inp.value="";
}
function delSkill(i){ D.skills.splice(i,1); renderSkills(); render(); }
function renderSkills(){
  document.getElementById("skillCloud").innerHTML = D.skills.map(function(s,i){
    return '<span class="skill-chip">'+esc(s)+'<span class="skill-del" onclick="delSkill('+i+')">✕</span></span>';
  }).join("");
}

/* ═══════════════════════════ EXPERIENCE ═══════════════════════════ */
function addExp(){ D.exp.push({id:Date.now(),title:"",company:"",period:"",desc:""}); renderCards(); }
function delExp(id){ D.exp=D.exp.filter(function(e){return e.id!==id;}); renderCards(); render(); }
function upExp(id,f,v){ D.exp.forEach(function(e){if(e.id===id)e[f]=v;}); render(); }

/* ═══════════════════════════ EDUCATION ═══════════════════════════ */
function addEdu(){ D.edu.push({id:Date.now(),degree:"",school:"",year:"",grade:""}); renderCards(); }
function delEdu(id){ D.edu=D.edu.filter(function(e){return e.id!==id;}); renderCards(); render(); }
function upEdu(id,f,v){ D.edu.forEach(function(e){if(e.id===id)e[f]=v;}); render(); }

/* ═══════════════════════════ PROJECTS ═══════════════════════════ */
function addProj(){ D.proj.push({id:Date.now(),name:"",tech:"",desc:"",link:""}); renderCards(); }
function delProj(id){ D.proj=D.proj.filter(function(p){return p.id!==id;}); renderCards(); render(); }
function upProj(id,f,v){ D.proj.forEach(function(p){if(p.id===id)p[f]=v;}); render(); }

/* ═══════════════════════════ RENDER CARDS ═══════════════════════════ */
function renderCards(){
  document.getElementById("expCards").innerHTML = D.exp.map(function(e){
    return '<div class="card">'
      +'<button class="card-del" onclick="delExp('+e.id+')">✕</button>'
      +'<div class="field"><label>Job Title</label><input value="'+esc(e.title)+'" placeholder="Senior Developer" oninput="upExp('+e.id+',\'title\',this.value)"/></div>'
      +'<div class="field"><label>Company</label><input value="'+esc(e.company)+'" placeholder="Infosys, TCS, Wipro…" oninput="upExp('+e.id+',\'company\',this.value)"/></div>'
      +'<div class="field"><label>Period</label><input value="'+esc(e.period)+'" placeholder="Jan 2022 – Present" oninput="upExp('+e.id+',\'period\',this.value)"/></div>'
      +'<div class="field"><label>Description</label><textarea oninput="upExp('+e.id+',\'desc\',this.value)" placeholder="Key responsibilities and achievements…">'+esc(e.desc)+'</textarea></div>'
      +'</div>';
  }).join('')+'<button class="add-row" onclick="addExp()">＋ Add Another Experience</button>';

  document.getElementById("eduCards").innerHTML = D.edu.map(function(e){
    return '<div class="card">'
      +'<button class="card-del" onclick="delEdu('+e.id+')">✕</button>'
      +'<div class="field"><label>Degree / Qualification</label><input value="'+esc(e.degree)+'" placeholder="B.Tech Computer Science" oninput="upEdu('+e.id+',\'degree\',this.value)"/></div>'
      +'<div class="field"><label>University / School</label><input value="'+esc(e.school)+'" placeholder="IIT Bombay, NIT Trichy…" oninput="upEdu('+e.id+',\'school\',this.value)"/></div>'
      +'<div class="g2">'
      +'<div class="field"><label>Year</label><input value="'+esc(e.year)+'" placeholder="2019" oninput="upEdu('+e.id+',\'year\',this.value)"/></div>'
      +'<div class="field"><label>Grade / CGPA</label><input value="'+esc(e.grade)+'" placeholder="8.5 CGPA" oninput="upEdu('+e.id+',\'grade\',this.value)"/></div>'
      +'</div></div>';
  }).join('')+'<button class="add-row" onclick="addEdu()">＋ Add Another Education</button>';

  document.getElementById("projCards").innerHTML = D.proj.map(function(p){
    return '<div class="card">'
      +'<button class="card-del" onclick="delProj('+p.id+')">✕</button>'
      +'<div class="field"><label>Project Name</label><input value="'+esc(p.name)+'" placeholder="E-Commerce Dashboard" oninput="upProj('+p.id+',\'name\',this.value)"/></div>'
      +'<div class="field"><label>Tech Stack</label><input value="'+esc(p.tech)+'" placeholder="React, Node.js, MongoDB" oninput="upProj('+p.id+',\'tech\',this.value)"/></div>'
      +'<div class="field"><label>Description</label><textarea oninput="upProj('+p.id+',\'desc\',this.value)" placeholder="What you built and its impact…">'+esc(p.desc)+'</textarea></div>'
      +'<div class="field"><label>Link (optional)</label><input value="'+esc(p.link)+'" placeholder="github.com/yourproject" oninput="upProj('+p.id+',\'link\',this.value)"/></div>'
      +'</div>';
  }).join('')+'<button class="add-row" onclick="addProj()">＋ Add Another Project</button>';
}

/* ═══════════════════════════ PHOTO ═══════════════════════════ */
function loadPhoto(e){
  var f=e.target.files[0]; if(!f) return;
  var r=new FileReader();
  r.onload=function(ev){
    D.photo=ev.target.result; D.showPhoto=true;
    document.getElementById("photoImg").src=D.photo;
    document.getElementById("photoImg").style.display="block";
    document.getElementById("photoEmoji").style.display="none";
    document.getElementById("t-photo").className="tog on";
    render();
  };
  r.readAsDataURL(f);
}

/* ═══════════════════════════ DESIGN ═══════════════════════════ */
function buildPalette(){
  document.getElementById("swatches").innerHTML = PALETTE.map(function(c){
    return '<div class="swatch'+(D.color===c?" active":"")+'" style="background:'+c+(c==='#374151'?';border:1px solid #555':'')+'" onclick="setColor(\''+c+'\')"></div>';
  }).join("");
}
function setColor(c){ D.color=c; document.getElementById("d-color").value=c; buildPalette(); render(); }
function togOpt(k){
  var key="show"+ucfirst(k); D[key]=!D[key];
  document.getElementById("t-"+k).className="tog"+(D[key]?" on":"");
  render();
}

/* ═══════════════════════════ SYNC + SAVE ═══════════════════════════ */
function sync(){
  ["name","role","email","phone","location","linkedin","website","summary"].forEach(function(f){
    var el=document.getElementById("i-"+f); if(el) D[f]=el.value;
  });
  D.fs = parseInt(document.getElementById("d-fs").value);
  D.template = document.getElementById("d-template").value;
}
function doSave(btn){
  sync(); localStorage.setItem("arb_v2",JSON.stringify(D));
  btn.textContent="✅ Saved!"; setTimeout(function(){ btn.textContent="💾 Save"; },1600);
}
function doExport(){
  sync();
  var a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([JSON.stringify(D,null,2)],{type:"application/json"}));
  a.download=(D.name||"resume").replace(/\s+/g,"-")+".json"; a.click();
}

/* ═══════════════════════════ RENDER RESUME ═══════════════════════════ */
function render(){
  sync();
  var c=D.color, fs=D.fs;

  /* helpers */
  function sh(t){
    return '<div style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:'+c
      +';border-bottom:2px solid '+c+';padding-bottom:3px;margin:14px 0 9px;font-family:\'DM Sans\',sans-serif;">'+t+'</div>';
  }
  function shL(t){ // left-panel section heading (smaller)
    return '<div style="font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:1.8px;color:'+c
      +';border-bottom:1px solid '+c+'44;padding-bottom:3px;margin:14px 0 8px;font-family:\'DM Sans\',sans-serif;">'+t+'</div>';
  }

  var contactParts=[];
  if(D.email)    contactParts.push("✉ "+esc(D.email));
  if(D.phone)    contactParts.push("📞 "+esc(D.phone));
  if(D.location) contactParts.push("📍 "+esc(D.location));
  if(D.linkedin) contactParts.push("in "+esc(D.linkedin));
  if(D.website)  contactParts.push("🌐 "+esc(D.website));

  var skillsBlock = D.showSkills && D.skills.length
    ? '<div style="display:flex;flex-wrap:wrap;gap:4px;">'
      + D.skills.map(function(s){
          return '<span style="background:'+c+'1a;color:'+c+';border:1px solid '+c+'44;padding:2px 8px;border-radius:20px;font-size:'+(fs-2)+'px;font-weight:700;">'+esc(s)+'</span>';
        }).join('') + '</div>'
    : '';

  var summaryBlock = D.showSummary && D.summary
    ? '<p style="font-size:'+(fs-1)+'px;line-height:1.55;color:#555;margin:0;">'+esc(D.summary)+'</p>' : '';

  var expBlock = D.exp.map(function(e){
    return '<div style="margin-bottom:12px;">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;">'
      +'<strong style="font-size:'+fs+'px;color:#111;">'+esc(e.title)+'</strong>'
      +'<span style="font-size:'+(fs-2)+'px;color:'+c+';white-space:nowrap;margin-left:8px;flex-shrink:0;">'+esc(e.period)+'</span>'
      +'</div>'
      +'<div style="font-size:'+(fs-1)+'px;color:'+c+';font-weight:600;margin-bottom:3px;">'+esc(e.company)+'</div>'
      +'<p style="font-size:'+(fs-1)+'px;color:#555;line-height:1.45;margin:0;">'+esc(e.desc)+'</p>'
      +'</div>';
  }).join('');

  var eduBlock = D.edu.map(function(e){
    return '<div style="margin-bottom:10px;">'
      +'<strong style="font-size:'+fs+'px;color:#111;display:block;">'+esc(e.degree)+'</strong>'
      +'<div style="font-size:'+(fs-1)+'px;color:'+c+';font-weight:600;">'
        +esc(e.school)+(e.year?' · '+esc(e.year):'')+(e.grade?' · '+esc(e.grade):'')
      +'</div></div>';
  }).join('');

  var projBlock = D.showProjects && D.proj.length
    ? D.proj.map(function(p){
        return '<div style="margin-bottom:10px;">'
          +'<div style="display:flex;justify-content:space-between;align-items:baseline;">'
          +'<strong style="font-size:'+fs+'px;color:#111;">'+esc(p.name)+'</strong>'
          +'<span style="font-size:'+(fs-2)+'px;color:'+c+';margin-left:6px;">'+esc(p.tech)+'</span>'
          +'</div>'
          +'<p style="font-size:'+(fs-1)+'px;color:#555;line-height:1.45;margin:2px 0 0;">'+esc(p.desc)+'</p>'
          +(p.link?'<div style="font-size:'+(fs-2)+'px;color:'+c+';margin-top:2px;">'+esc(p.link)+'</div>':'')
          +'</div>';
      }).join('') : '';

  var photoEl = D.showPhoto && D.photo
    ? '<img src="'+D.photo+'" style="width:78px;height:78px;border-radius:50%;object-fit:cover;border:3px solid '+c+';float:right;margin:0 0 10px 16px;"/>'
    : '';

  var html = "";

  /* ── MODERN ── */
  if(D.template==="modern"){
    html='<div style="display:grid;grid-template-columns:168px 1fr;min-height:297mm;">'
      // left col
      +'<div style="background:'+c+'0c;padding:22px 14px;border-right:2px solid '+c+'22;">'
      +(D.showPhoto&&D.photo?'<img src="'+D.photo+'" style="width:96px;height:96px;border-radius:50%;object-fit:cover;border:3px solid '+c+';display:block;margin:0 auto 16px;"/>':'')
      +shL("Contact")
      +'<div style="font-size:'+(fs-2)+'px;color:#555;line-height:2.1;">'
      +(D.email?'<div>✉ '+esc(D.email)+'</div>':'')
      +(D.phone?'<div>📞 '+esc(D.phone)+'</div>':'')
      +(D.location?'<div>📍 '+esc(D.location)+'</div>':'')
      +(D.linkedin?'<div>in '+esc(D.linkedin)+'</div>':'')
      +(D.website?'<div>🌐 '+esc(D.website)+'</div>':'')
      +'</div>'
      +(D.showSkills&&D.skills.length?shL("Skills")+skillsBlock:'')
      +'</div>'
      // right col
      +'<div style="padding:22px 22px;">'
      +'<div style="border-bottom:3px solid '+c+';padding-bottom:12px;margin-bottom:4px;">'
      +'<h1 style="font-size:26px;font-weight:800;color:'+c+';margin:0;font-family:\'Syne\',sans-serif;letter-spacing:-0.5px;">'+esc(D.name)+'</h1>'
      +'<p style="font-size:'+(fs+1)+'px;font-weight:500;color:#666;margin:3px 0 0;">'+esc(D.role)+'</p>'
      +'</div>'
      +(summaryBlock?sh("About")+summaryBlock:'')
      +(D.exp.length?sh("Experience")+expBlock:'')
      +(D.edu.length?sh("Education")+eduBlock:'')
      +(D.showProjects&&D.proj.length?sh("Projects")+projBlock:'')
      +'</div>'
      +'</div>';

  /* ── CLASSIC ── */
  }else if(D.template==="classic"){
    html='<div style="padding:28px;min-height:297mm;">'
      +'<div style="overflow:hidden;border-bottom:3px solid '+c+';padding-bottom:16px;margin-bottom:4px;">'
      +photoEl
      +'<h1 style="font-size:28px;font-weight:800;color:#111;margin:0;font-family:\'Syne\',sans-serif;letter-spacing:-0.5px;">'+esc(D.name)+'</h1>'
      +'<p style="font-size:'+(fs+1)+'px;font-weight:600;color:'+c+';margin:5px 0 8px;">'+esc(D.role)+'</p>'
      +'<div style="font-size:'+(fs-2)+'px;color:#666;line-height:1.9;">'
        +contactParts.join("&nbsp; · &nbsp;")
      +'</div></div>'
      +(summaryBlock?sh("Summary")+summaryBlock:'')
      +(D.showSkills&&D.skills.length?sh("Skills")+skillsBlock:'')
      +(D.exp.length?sh("Work Experience")+expBlock:'')
      +(D.edu.length?sh("Education")+eduBlock:'')
      +(D.showProjects&&D.proj.length?sh("Projects")+projBlock:'')
      +'</div>';

  /* ── MINIMAL ── */
  }else if(D.template==="minimal"){
    html='<div style="padding:28px;min-height:297mm;">'
      +'<div style="text-align:center;padding-bottom:18px;border-bottom:1px solid #e5e5e5;margin-bottom:4px;">'
      +(D.showPhoto&&D.photo?'<img src="'+D.photo+'" style="width:84px;height:84px;border-radius:50%;object-fit:cover;border:3px solid '+c+';display:block;margin:0 auto 12px;"/>':'')
      +'<h1 style="font-size:30px;font-weight:800;color:#111;margin:0;font-family:\'Syne\',sans-serif;letter-spacing:-0.5px;">'+esc(D.name)+'</h1>'
      +'<p style="font-size:'+(fs+1)+'px;color:'+c+';font-weight:600;margin:5px 0 10px;">'+esc(D.role)+'</p>'
      +'<div style="font-size:'+(fs-2)+'px;color:#888;line-height:2;">'
        +contactParts.join(" &nbsp;·&nbsp; ")
      +'</div></div>'
      +(summaryBlock?'<div style="margin:14px 0;">'+summaryBlock+'</div>':'')
      +(D.showSkills&&D.skills.length?'<div style="text-align:center;margin-bottom:4px;">'+sh("Skills")+skillsBlock+'</div>':'')
      +(D.exp.length?sh("Experience")+expBlock:'')
      +(D.edu.length?sh("Education")+eduBlock:'')
      +(D.showProjects&&D.proj.length?sh("Projects")+projBlock:'')
      +'</div>';

  /* ── BOLD ── */
  }else if(D.template==="bold"){
    html='<div style="min-height:297mm;">'
      +'<div style="background:'+c+';padding:24px 28px;display:flex;align-items:center;gap:20px;">'
      +(D.showPhoto&&D.photo?'<img src="'+D.photo+'" style="width:84px;height:84px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,0.6);flex-shrink:0;"/>':'')
      +'<div>'
      +'<h1 style="font-size:28px;font-weight:800;color:#fff;margin:0;font-family:\'Syne\',sans-serif;letter-spacing:-0.5px;">'+esc(D.name)+'</h1>'
      +'<p style="font-size:'+(fs+2)+'px;color:rgba(255,255,255,0.8);margin:5px 0 0;font-weight:500;">'+esc(D.role)+'</p>'
      +'</div></div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:7px;padding:14px 28px;border-bottom:2px solid '+c+'22;">'
        +contactParts.map(function(p){ return '<span style="font-size:'+(fs-2)+'px;background:'+c+'18;color:'+c+';padding:3px 10px;border-radius:20px;">'+p+'</span>'; }).join('')
      +'</div>'
      +'<div style="padding:6px 28px 28px;">'
      +(summaryBlock?sh("About Me")+summaryBlock:'')
      +(D.showSkills&&D.skills.length?sh("Skills")+skillsBlock:'')
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">'
      +'<div>'+(D.exp.length?sh("Experience")+expBlock:'')+'</div>'
      +'<div>'+(D.edu.length?sh("Education")+eduBlock:'')+(D.showProjects&&D.proj.length?sh("Projects")+projBlock:'')+'</div>'
      +'</div></div></div>';
  }

  var p=document.getElementById("paper");
  p.innerHTML=html;
  p.style.fontSize=fs+"px";
}

init();
</script>
</body>
</html>
